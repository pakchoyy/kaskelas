<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0ea5a0" />
    <meta name="description" content="Aplikasi kas kelas untuk guru SD/SMP dengan sinkronisasi ke Google Spreadsheet." />
    <link rel="icon" type="image/png" href="/guru-cibisd2.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Bantu Guru Yuk - Kas Kelas</title>
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: linear-gradient(135deg, #0ea5a0 0%, #0d7a8a 50%, #2d6a7f 100%);
        color: #ffffff;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      }
      #app-splash img {
        width: 104px;
        height: 104px;
        border-radius: 24px;
        box-shadow: 0 18px 40px rgba(13, 26, 42, 0.25);
      }
      #app-splash .brand {
        font-size: 13px;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        opacity: 0.85;
      }
      #app-splash .title {
        font-size: 22px;
        font-weight: 700;
      }
      #app-splash .spinner {
        width: 28px;
        height: 28px;
        border: 3px solid rgba(255, 255, 255, 0.4);
        border-top-color: #ffffff;
        border-radius: 50%;
        animation: app-spin 0.9s linear infinite;
      }
      @keyframes app-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="app-splash">
      <img src="/guru-cibisd2.png" alt="Logo Kas Kelas" />
      <div class="brand">Bantu Guru Yuk</div>
      <div class="title">Kas Kelas</div>
      <div class="spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
